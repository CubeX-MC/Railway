  help_portal: "<green>Comando: <gold>/rw portal <white>- Gestionar portales de vagoneta (usa /rw portal para subcomandos)"
  help_gui: "<green>Comando: <gold>/rw gui <white>- Abrir panel de gestión GUI"
  help_reload: "<green>Comando: <gold>/rw reload <white>- Recargar configuración"
  help_testendpoint: "<green>Comando: <gold>/rail testendpoint <white>- Probar visualización de estación terminal"
  help_teststopinfo: "<green>Comando: <gold>/rail teststopinfo \\<line_id> [stop_id] <white>- Probar información de paradas de línea"
