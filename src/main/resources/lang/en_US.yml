lang-version: 2
# Railway plugin English Language File

# Basic Information
plugin:
  enabled: "<green>Railway plugin enabled!"
  disabled: "<red>Railway plugin disabled!"
  reload: "<green>Configuration reloaded successfully."
  no_permission: "<red>You don't have permission to use this command."
  players_only: "<red>This command can only be used by players."

# Command Related Messages
command:
  # Main command help
  help_header: "<green>===== Railway Admin Command Help ====="
  help_line: "<green>Command: <gold>/rw line <white>- Manage metro lines (use /rw line for subcommands)"
  help_stop: "<green>Command: <gold>/rw stop <white>- Manage stops (use /rw stop for subcommands)"
  help_portal: "<green>Command: <gold>/rw portal <white>- Manage minecart portals (use /rw portal for subcommands)"
  help_gui: "<green>Command: <gold>/rw gui <white>- Open GUI management panel"
  help_reload: "<green>Command: <gold>/rw reload <white>- Reload configuration"
  help_testendpoint: "<green>Command: <gold>/rail testendpoint <white>- Test terminal station prompt display"
  help_teststopinfo: "<green>Command: <gold>/rail teststopinfo \\<line_id> [stop_id] <white>- Test line stop information"
  unknown: "<red>Unknown command. Use /rw for help."
  teleport_to: "<green>Click to teleport to <stop_name>"
  player_not_found: "<red>Player <player> not found."
  confirm_required: "<yellow>This action is destructive. Add <gold>confirm <yellow>to run it."
  confirm_hint: "<yellow>Run: <gold><command>"

# Selection Related Messages
selection:
  corner1_set: "<green>Successfully set the first corner point at: <location>"
  corner2_set: "<green>Successfully set the second corner point at: <location>"

