config-version: 2
# Metro 配置文件
# Metro Configuration File

# Title 显示配置
# Title Display Configuration
titles:
  # 停靠区显示（包含进入时和持续显示）
  # Stop Area Display (includes entering and continuous display)
  stop_continuous:
    enabled: true
    # 刷新间隔，单位tick
    # Refresh interval in ticks
    interval: 40
    # 是否在站台区域始终显示信息，true为持续显示，false为仅在进入时显示一次
    # Whether to always display information in the station area. true for continuous display, false for displaying only once upon entry
    always: true
    # 普通站点
    # Normal station
    title: '<aqua><stop_name>'
    subtitle: '<light_purple>➔ <terminus_name> <dark_gray>| <yellow>» <next_stop_name> <dark_gray>| <green>⇄ <stop_transfers>'
    actionbar: '<white>Next train <yellow><eta_formatted> <gray>| <white>Right-click rail to board <gray>[<reset><line_color_code><line><gray>]'
    # 始发站特殊显示
    # Special display for starting station
    start_stop:
      title: '<aqua><stop_name>'
      subtitle: '<light_purple>➔ <terminus_name> <dark_gray>| <white>Origin <dark_gray>| <green>⇄ <stop_transfers>'
      actionbar: '<white>Next train <yellow><eta_formatted> <gray>| <white>Right-click rail to board <gray>[<reset><line_color_code><line><gray>]'
    # 终点站特殊显示
    # Special display for terminal station
    end_stop:
      title: '<aqua><stop_name>'
      subtitle: '<red>🛑 Terminal Station <dark_gray>| <green>⇄ <stop_transfers>'
      actionbar: '<red>End of line. Please allow passengers to exit.'
    # 以下选项仅在 always=false 时生效
    # The following options are effective only when always=false
    fade_in: 10
    stay: 40
    fade_out: 10
  
  # 到达站台时显示的title
  # Title displayed upon arrival at the station
  arrive_stop:
    enabled: true
    title: '<aqua><stop_name>'
    subtitle: '<gray>Next: <yellow><next_stop_name> <dark_gray>| <green>⇄ <stop_transfers>'
    fade_in: 10
    stay: 40
    fade_out: 10
  
  # 终点站显示
  # Terminal station display
  terminal_stop:
    enabled: true
    title: '<aqua><stop_name>'
    subtitle: '<red>🛑 Terminal <dark_gray>| <green>⇄ <stop_transfers>'
    fade_in: 10
    stay: 60
    fade_out: 10
  
  # 乘客上车后行程信息
  # Trip information after passenger boards
  departure:
    enabled: true
    # 刷新间隔，单位tick
    # Refresh interval in ticks
    interval: 40
    title: '<yellow>» <next_stop_name>'
    subtitle: '<light_purple>➔ <terminus_name>'
    actionbar: '<gray>Departing... Please stand clear of the doors.'
    fade_in: 5
    stay: 40
    fade_out: 5
  
  # 乘客等待发车时的信息
  # Information while passenger is waiting for departure
  waiting:
    enabled: true
    # 刷新间隔，单位tick
    # Refresh interval in ticks
    interval: 20
    title: '<white>Departing Soon'
    subtitle: '<gray>Current: <green><stop_name> <dark_gray>| <gray>Next: <yellow><next_stop_name>'
    actionbar: '<yellow>⚠ Departing in <red><countdown>s'

# 音乐配置
# Sound Configuration
sounds:
  # 发车时播放的音乐（模拟地铁发车前的提示音）
  # Sound played on departure (simulates pre-departure announcement)
  departure:
    enabled: true
    # 播放前的初始延迟（单位tick，20tick=1秒）
    # Initial delay before playing (in ticks, 20 ticks = 1 second)
    initial_delay: 0
    # 音符序列，格式为 "类型,音高,音量,乐器,延迟"
    # Note sequence, format: "TYPE,PITCH,VOLUME,INSTRUMENT,DELAY"
    # 类型可以是 NOTE (音符盒音符) 或 CUSTOM (自定义声音)
    # TYPE can be NOTE (noteblock sound) or CUSTOM (custom sound)
    # 音高范围：0-24 (对应F#3到F#5)
    # PITCH range: 0-24 (corresponds to F#3 to F#5)
    # 音量范围：0.0-1.0
    # VOLUME range: 0.0-1.0
    # 对于NOTE，乐器可以是：PIANO, BASS, SNARE, CLICKS, BASS_DRUM, BELL, FLUTE, CHIME, GUITAR, XYLOPHONE, IRON_XYLOPHONE, COW_BELL, DIDGERIDOO, BIT, BANJO, PLING
    # For NOTE, INSTRUMENT can be: PIANO, BASS, SNARE, CLICKS, BASS_DRUM, BELL, FLUTE, CHIME, GUITAR, XYLOPHONE, IRON_XYLOPHONE, COW_BELL, DIDGERIDOO, BIT, BANJO, PLING
    notes:
    - NOTE,18,1.0,PLING,0
    - NOTE,18,1.0,PLING,4
  
  # 到站时播放的音乐（模拟车内到站提示音）
  # Sound played on arrival (simulates in-train arrival announcement)
  arrival:
    enabled: true
    # 播放前的初始延迟（单位tick，20tick=1秒）
    # Initial delay before playing (in ticks, 20 ticks = 1 second)
    initial_delay: 20
    notes:
    - NOTE,6,0.8,CHIME,0
    - NOTE,10,0.9,CHIME,4
    - NOTE,13,1.0,CHIME,8
  
  # 车辆到站时播放的音乐（模拟站台列车进站声音）
  # Sound played when train arrives at station (simulates platform arrival sound)
  station_arrival:
    enabled: true
    # 播放前的初始延迟（单位tick，20tick=1秒）
    # Initial delay before playing (in ticks, 20 ticks = 1 second)
    initial_delay: 0
    notes:
    - NOTE,1,0.5,BASS_DRUM,0
    - NOTE,5,0.3,SNARE,5
  
  # 等待发车时循环播放的提示音乐
  # Looping sound played while waiting for departure
  waiting:
    enabled: true
    # 播放前的初始延迟（单位tick，20tick=1秒）
    # Initial delay before playing (in ticks, 20 ticks = 1 second)
    initial_delay: 0
    # 循环间隔（单位tick，20tick=1秒）多长时间播放一次
    # Loop interval (in ticks, 20 ticks = 1 second), how often to play
    interval: 20
    notes:
    - NOTE,18,0.3,CLICKS,0

# 经济系统配置
# Economy Settings
economy:
  # 是否启用经济系统收费功能
  # Enable economy system billing features
  enabled: true

# 计分板配置
# Scoreboard Configuration
scoreboard:
  # 是否启用计分板
  # Enable scoreboard
  enabled: true
  # 站点显示样式
  # Stop display styles
  styles:
    # 当前站点样式
    # Current stop style
    current_stop: '<gold>☛ <bold>'
    # 经过站点样式
    # Passed stop style
    passed_stop: '<dark_gray>▼ <gray><italic>'
    # 等待发车时的途径站点样式
    # Waiting next stop style
    waiting_next_stop: '<white>▽ <bold>'
    # 行驶中的途径站点样式
    # Moving next stop style
    moving_next_stop: '<gold>☛ <bold>'
    # 终点站样式
    # Terminal stop style
    terminal_stop: ' ◇ <white><underlined>'
    # 普通下站样式 (兼容用途)
    # Next stop style (fallback)
    next_stop: '<green>○ '
    # 其他站点样式 (兼容用途)
    # Other stops style (fallback)
    other_stops: '<gray>· '
    # 折叠省略符
    # Folding symbol
    folding_symbol: '     <dark_gray>...     '
  # 线路标识符配置
  # Line identifier configuration
  line_symbol: ❙ # 所有线路统一使用的标识符，将根据线路颜色自动着色
# Identifier used for all lines, will be colored automatically based on line color

# 速度控制相关设置
# Speed Control Settings
speed_control:
  # 控速模式: VANILLA_MOMENTUM (原版推力惯性) 或 BLOCK_BASED (根据铁轨下方方块实时控速)
  # Speed control mode: VANILLA_MOMENTUM (Vanilla momentum) or BLOCK_BASED (Real-time speed control based on blocks below rails)
  mode: VANILLA_MOMENTUM
  # 铁轨下方方块速度映射表 (仅在 BLOCK_BASED 开启时有效) 可以按世界分组配置
  # Block speed mapping table (only effective when BLOCK_BASED is enabled). Can be configured per world
  worlds:
    default:
      SOUL_SAND: 0.2
      STONE_BRICKS: 0.6
      EMERALD_BLOCK: 1.2
      AIR: 0.4
    world_nether:
      EMERALD_BLOCK: 0.8

# 网页地图集成配置
# Web Map Integration Settings
map_integration:
  # 是否启用网页地图集成（在BlueMap/Dynmap/Squaremap上显示地铁线路）
  # Enable web map integration (display metro lines on BlueMap/Dynmap/Squaremap)
  enabled: false
  # 地图插件提供者: AUTO, BLUEMAP, DYNMAP, SQUAREMAP
  # Map plugin provider: AUTO, BLUEMAP, DYNMAP, SQUAREMAP
  provider: AUTO
  # MarkerSet 标签（在地图图层面板中显示的名称）
  # MarkerSet label (displayed in the map layer panel)
  marker_set_label: 'Metro Network'
  # 是否默认在地图上显示（用户可以在网页地图上手动开关此图层）
  # Whether to show on map by default (users can toggle this layer on the web map)
  default_visible: true
  # 线路默认宽度（像素）
  # Default line width (in pixels)
  line_width: 3
  # 是否为每个站点显示 POI 标记
  # Whether to show POI markers for each stop
  show_stop_markers: true
  # 是否在站点 POI 标记上显示换乘信息
  # Whether to show transfer information on stop POI markers
  show_transfer_info: true
  # 数据连续变化后的地图刷新合并延迟（单位 tick，20 tick = 1 秒）
  # Delay used to merge repeated map refresh requests after data changes (in ticks, 20 ticks = 1 second)
  refresh_delay_ticks: 20

# 线路录制配置
# Route Recording Settings
route_recording:
  # 录制线路时两个保存采样点之间的最小距离（单位：方块）
  # Minimum distance between saved raw route samples while recording (in blocks)
  min_sample_distance_blocks: 1.0
  # 保存线路前是否删除同一直线上的中间采样点
  # Whether to remove middle samples on the same straight segment before saving
  simplify_collinear_points: true
  # 共线压缩容差（单位：方块）；较大值会更积极地压缩轻微抖动
  # Collinearity tolerance in blocks; larger values compress small jitter more aggressively
  simplify_epsilon_blocks: 0.15

# 矿车传送门设置
# Minecart Portal Settings
portals:
  # 是否启用矿车传送门功能
  # Enable minecart portal feature
  enabled: true
  # 传送门触发方块（铁轨下方的方块类型）
  # Portal trigger block (block type below the rail)
  trigger_block: CRYING_OBSIDIAN
  # 传送前延迟（单位tick，20tick=1秒）
  # Teleport delay (in ticks, 20 ticks = 1 second)
  teleport_delay: 5
  # 传送特效
  # Teleport effects
  effects:
    # 是否显示粒子效果
    # Whether to show particle effects
    particles: true
    # 是否播放传送音效
    # Whether to play teleport sound
    sound: true

# 一般设置
# General Settings
settings:
  selection_tool: GOLDEN_SHOVEL
  # Default language setting (Supported: zh_CN, zh_TW, en_US, de_DE, es_ES, nl_NL, tr_TR)
  default_language: en_US
  # 安全模式：开启后保护乘客免受三类干扰
  # Safe mode: when enabled, protects passengers from three types of interference
  safe_mode:
    # 是否启用安全模式
    # Enable safe mode
    enabled: true
    # 实体推力保护：阻止其他实体撞击/推动地铁矿车
    # Entity push protection: prevent other entities from pushing the metro minecart
    entity_push_protection: true
    # 矿车伤害保护：阻止其他玩家攻击/破坏地铁矿车
    # Minecart damage protection: prevent other players from attacking/breaking the metro minecart
    damage_protection: true
    # 行驶辅助：在普通铁轨上失速时，只对活动地铁矿车补充最小动量
    # Movement assist: restore minimal momentum for active metro minecarts stalled on normal rails
    movement_assist: true
    # 乘客拆轨保护：玩家乘坐 Metro 矿车时禁止破坏铁轨
    # Passenger rail break protection: prevent players riding Metro minecarts from breaking rails
    passenger_rail_break_protection: true
    # 判定为失速的水平速度阈值
    # Horizontal speed threshold used to detect stalls
    min_cruise_speed: 0.08
    # 失速检测间隔，单位tick；只按活动矿车数量运行
    # Stall recovery interval in ticks; runs only per active metro minecart
    stall_recovery_ticks: 8
  # 矿车移动速度
  # Minecart movement speed
  cart_speed: 0.3
  # 矿车生成延迟（右键铁轨后多久生成矿车，单位tick，20tick=1秒）
  # Minecart spawn delay (how long after right-clicking the rail to spawn, in ticks, 20 ticks = 1 second)
  cart_spawn_delay: 60
  # 矿车消失延迟（下车后多久矿车消失，单位tick，20tick=1秒）
  # Minecart despawn delay (how long after dismounting for the cart to disappear, in ticks, 20 ticks = 1 second)
  cart_despawn_delay: 0
  # 矿车发车延迟（上车后多久自动发车，单位tick，20tick=1秒）
  # Minecart departure delay (how long after boarding for the cart to depart automatically, in ticks, 20 ticks = 1 second)
  cart_departure_delay: 100
  # 交互冷却时间（单位：毫秒）
  # Interact cooldown time (in milliseconds)
  interact_cooldown: 2000
  # 矿车生成等待超时（单位：毫秒）
  # Minecart pending timeout (in milliseconds)
  minecart_pending_timeout: 60000
  # 右键铁轨时下班车 ETA 的显示方式
  # Next-train ETA display when right-clicking rails
  interact:
    # 显示通道：ACTIONBAR / TITLE / SUBTITLE
    # Display channel: ACTIONBAR / TITLE / SUBTITLE
    type: SUBTITLE
    # 显示时长（tick，20tick=1秒），仅对 TITLE/SUBTITLE 生效
    # Display duration (ticks, 20 ticks = 1 second); only applies to TITLE/SUBTITLE
    stay_ticks: 60
  # 调试日志配置（仅用于排障）
  # Debug logging configuration (for troubleshooting only)
  debug:
    enabled: false
    # 列车状态切换日志
    # Train state transition logs
    train_state_transitions: true
    # 玩家交互流程日志
    # Player interaction flow logs
    interaction_flow: true
    # 计分板诊断日志
    # Scoreboard diagnostic logs
    scoreboard: true

# 脱轨相关设置
# Derailment Settings
derailment:
  # 爆炸功能
  # Explosion feature
  explosion:
    # 设置为 true 开启此功能, false 关闭
    # Set to true to enable this feature, false to disable
    enabled: false
    # 爆炸威力 (4.0 相当于TNT)
    # Explosion power (4.0 is equivalent to TNT)
    power: 4.0
    # 爆炸是否引起火灾
    # Whether the explosion causes fire
    set_fire: false
    # 爆炸是否破坏方块
    # Whether the explosion breaks blocks
    break_blocks: false

# =============================================
# Railway Service Configuration
# =============================================

service:
  mode: local
  default-headway-seconds: 120
  heartbeat-interval-ticks: 1
  metrics-log-interval-ticks: 0
  local:
    activation-radius: 16.0
    rail-search-radius: 5
    spawn-mode: platform_boundary
    virtual-idle-ticks: 200
    virtual-lookahead-stops: 2
    virtualization-enabled: true

# =============================================
# Train Physics Configuration
# =============================================

train:
  control-mode: reactive
  physics-lead-kinematic: true
  physics-lookahead-blocks: 4
  safe-speed-mode: true
  leash-offset-y: 0.2
  leash-mob-type: ALLAY
  name: "RailwayTrain"
  name-visible: false

cart-speed: 0.4
train-spacing: 1.6

# =============================================
# Chunk Loading Configuration
# =============================================

chunk-loading:
  enabled: true
  radius: 2
  forward-preload-radius: 1
  only-when-moving: false
  update-interval-ticks: 10

# =============================================
# Entity Model Configuration
# =============================================

entity-model:
  enabled: false
  offset-y: 0.0
  multi-passenger: false
  # Leave blank to reuse train.leash-mob-type when valid, otherwise PIG.
  entity-type-override: ""

# =============================================
# Travel Time Estimation
# =============================================

travel-time:
  enabled: false
  default-section-seconds: 10.0
  prior-strength: 3.0
  outlier-sigma: 4.0
  decay-per-day: 0.05
  use-unboarded-samples: false
  unboarded-sample-weight: 0.5
